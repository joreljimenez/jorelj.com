<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jorelj.com — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --border:     #30363d;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --accent:     #58a6ff;
      --accent-h:   #79b8ff;
      --radius:     10px;
      --transition: 0.25s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(88,166,255,0.07) 0%, transparent 60%);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      animation: cardIn 0.45s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-tagline {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 36px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }
    input[type="password"]::placeholder { color: #444c56; }
    button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    }
    button[type="submit"]:hover {
      background: var(--accent-h);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(88,166,255,0.3);
    }
    button[type="submit"]:active { transform: translateY(0); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.35);
      border-radius: var(--radius);
      color: #f85149;
      font-size: 0.85rem;
      text-align: center;
      animation: shake 0.35s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }
    .login-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 0.75rem;
      color: #444c56;
    }
    @media (max-width: 420px) { .login-card { padding: 36px 24px 32px; } }
  </style>
</head>
<body>
  <div class="login-card" role="main">
    <p class="login-logo">JJ</p>
    <p class="login-tagline">Private access — password required</p>
    <form id="login-form" autocomplete="off" novalidate>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" autofocus required />
      </div>
      <button type="submit" id="submit-btn">Continue</button>
      <p class="error-msg" id="error-msg" role="alert" aria-live="assertive">Incorrect password. Please try again.</p>
    </form>
    <p class="login-footer">jorelj.com</p>
  </div>
  <script>
    (function () {
      'use strict';
      var PASSWORD_HASHES = [
        '8529ab6899015263573df683e57a9de269d60d38f9a5493152e1f53e8c5c2730', // mitchell
        // add more hashes here
      ];
      var COOKIE_NAME   = 'jj_auth';
      var COOKIE_PATH   = '/';
      var COOKIE_MAXAGE = 60 * 60 * 24 * 7;
      var REDIRECT_TO   = '/';

      var form      = document.getElementById('login-form');
      var input     = document.getElementById('password');
      var submitBtn = document.getElementById('submit-btn');
      var errorMsg  = document.getElementById('error-msg');

      function bufferToHex(buffer) {
        return Array.from(new Uint8Array(buffer))
          .map(function (b) { return b.toString(16).padStart(2, '0'); })
          .join('');
      }

      function grantAccess(hash) {
        document.cookie = [
          COOKIE_NAME + '=' + hash,
          'path=' + COOKIE_PATH,
          'max-age=' + COOKIE_MAXAGE,
          'SameSite=Strict',
          'Secure'
        ].join('; ');
        window.location.replace(REDIRECT_TO);
      }

      function showError() {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Continue';
        errorMsg.style.display = 'none';
        void errorMsg.offsetHeight;
        errorMsg.style.display = 'block';
        input.value = '';
        input.focus();
      }

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        var password = input.value;
        if (!password) return;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Checking…';
        crypto.subtle.digest('SHA-256', new TextEncoder().encode(password))
          .then(function (hashBuffer) {
            var hex = bufferToHex(hashBuffer);
            if (PASSWORD_HASHES.indexOf(hex) !== -1) {
              grantAccess(hex);
            } else {
              showError();
            }
          })
          .catch(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Continue';
          });
      });
    })();
  </script>
</body>
</html>
